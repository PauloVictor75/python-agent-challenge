version: "3.9"
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: llm_kb_agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
